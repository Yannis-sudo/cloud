version: '3.9'

services:
  backend:
    build: ./backend
    ports:
      - "5555:5555"
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=mongodb://mongodb:27017
      - DATABASE_NAME=copilot
    depends_on:
      - mongodb

  mongodb:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:

